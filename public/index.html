<!DOCTYPE html>
<html>

<head>

<title>Smart Expense Dashboard</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

<div class="sidebar">

<h3>Expense App</h3>

<ul>

<li onclick="showDashboard()">Dashboard</li>
<li onclick="showAdd()">Add Expense</li>
<li onclick="showHistory()">History</li>
<li onclick="showCharts()">Graphs</li>
<li onclick="showVision()">Live Vision</li>
<li onclick="showAdvice()">AI Advice</li>

</ul>

</div>

<div class="content">

<h1>Smart Expense Dashboard</h1>


<div id="dashboard">

<h2>Total Expense ₹ <span id="totalAmount">0</span></h2>

</div>


<div id="addExpense" class="page">

<h2>Add Expense</h2>

<form id="expenseForm" enctype="multipart/form-data">

<input type="text" name="title" placeholder="Title" required>

<input type="number" name="amount" placeholder="Amount" required>

<input type="text" name="category" placeholder="Category">

<input type="date" name="date">

<input type="file" name="bill">

<button type="submit">Add Expense</button>

</form>

</div>


<div id="history" class="page">

<h2>Expense History</h2>

<table>

<thead>

<tr>
<th>Title</th>
<th>Amount</th>
<th>Category</th>
<th>Date</th>
<th>Bill</th>
<th>Delete</th>
</tr>

</thead>

<tbody id="expenseTable"></tbody>

</table>

</div>


<div id="charts" class="page">

<h2>Expense Graph</h2>

<canvas id="barChart"></canvas>

<h2>Category Pie Chart</h2>

<canvas id="pieChart"></canvas>

</div>


<div id="vision" class="page">

<h2>Live Vision</h2>

<video id="video" width="400" autoplay></video>

</div>


<div id="advice" class="page">

<h2>Expense Advice</h2>

<p id="adviceText"></p>

</div>

</div>

</div>

<script src="indexScript.js"></script>

</body>

</html>
